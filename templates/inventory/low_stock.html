<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Low Stock</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="
    bg-[#0f172a]
    min-h-screen
    p-10
">

<div class="max-w-7xl mx-auto">

    <!-- TITLE -->

    <div class="mb-10">

        <h1 class="
            text-6xl
            font-black
            text-white
        ">

            Low Stock Alerts

        </h1>

        <p class="
            text-gray-400
            text-xl
            mt-3
        ">

            Products running low in inventory

        </p>

    </div>


    <!-- ALERTS -->

    <div class="
        grid
        grid-cols-1
        md:grid-cols-2
        lg:grid-cols-3
        gap-6
    ">

        {% for product in low_stock_items %}

        <div class="
            bg-red-500/10
            border
            border-red-500/30
            rounded-3xl
            p-8
            shadow-2xl
        ">

            <div class="
                flex
                items-center
                justify-between
            ">

                <div>

                    <h2 class="
                        text-3xl
                        font-black
                        text-white
                    ">

                        {{ product.name }}

                    </h2>

                    <p class="
                        text-red-400
                        mt-3
                        text-xl
                    ">

                        LOW STOCK

                    </p>

                </div>

                <div class="
                    text-6xl
                ">

                    ⚠

                </div>

            </div>


            <div class="mt-8">

                <div class="
                    bg-[#111827]
                    rounded-2xl
                    p-5
                ">

                    <div class="
                        text-gray-400
                        text-lg
                    ">

                        Current Quantity

                    </div>

                    <div class="
                        text-4xl
                        font-black
                        text-white
                        mt-2
                    ">

                        {{ product.quantity }}
                        {{ product.unit }}

                    </div>

                </div>

            </div>

        </div>

        {% empty %}

        <div class="
            text-white
            text-3xl
            font-bold
        ">

            No low stock products 🎉

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
